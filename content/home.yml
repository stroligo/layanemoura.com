      pt: Detalhe de mapa de reino de fantasia por {name}
  eyebrow:
    en: Map making
    pt: Criação de mapas
  heading:
    en: Illustrative maps for real & imagined worlds
    pt: Mapas ilustrados para mundos reais e imaginários
  text:
    en: >-
      Layane specializes in hand-crafted cartography — from fantasy realms and
      RPG worlds to travel posters, city atlases and visitor guides.


      Each map balances clarity and storytelling: coastlines, towns, paths and
      small hidden details that invite viewers to linger and explore.


      Whether for publishing, tourism, editorial campaigns or personal worlds,
      every piece is drawn with organic textures and a timeless, inviting feel.
    pt: >-
      Layane é especializada em cartografia ilustrada — de reinos de fantasia e
      mundos de RPG a pôsteres de viagem, atlas urbanos e guias turísticos.


      Cada mapa equilibra clareza e narrativa: costas, vilas, trilhas e pequenos
      detalhes escondidos que convidam o olhar a explorar.


      Seja para editoras, turismo, campanhas editoriais ou universos pessoais,
      cada peça é desenhada com texturas orgânicas e um clima atemporal e
      acolhedor.
  cta:
    en: Discuss a map project
    pt: Falar sobre um mapa
